# Отдаёт собранный фронтенд и проксирует API на контейнер backend.
server {
  listen 80;
  server_name _;

  # лимит размера загружаемого файла (согласуйте с max_upload_mb бэкенда)
  client_max_body_size 60m;

  # все /api/* — на бэкенд (имя backend = сервис из docker-compose)
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # SPA: любой неизвестный путь отдаёт index.html (маршрутизация в React)
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
